<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  
  <!-- SEO Tags -->
  {% seo %}

  <!-- Google Fonts - Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}?v=2">
  
  {% if site.primary_color %}
  <!-- Inyección de Color Dinámico desde _config.yml -->
  <style>
    :root {
      --primary: {{ site.primary_color }} !important;
    }
  </style>
  {% endif %}
  
  <!-- Supabase JS Client SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Lucide Icons for premium modern look -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Loader CSS & Global Functions -->
  <style>
    /* Estilos para el Loader Global */
    .global-loader-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      background-color: #0a0a0b;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      transition: opacity 0.4s ease, visibility 0.4s ease;
      opacity: 1;
      visibility: visible;
    }

    .global-loader-container.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    .global-loader-content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Animación sutil de rotación/pulso para la tijera */
    .loader-scissors-icon {
      background: rgba(212, 175, 55, 0.05);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 50%;
      width: 90px;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
      animation: pulse-glow 2s infinite ease-in-out;
    }

    .loader-scissors-icon i {
      animation: scissor-wiggle 3s infinite ease-in-out;
      display: inline-block;
    }

    .loader-brand-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #f3f4f6;
      margin: 0;
      background: linear-gradient(135deg, #f3f4f6 0%, #d4af37 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .loader-progress-bar {
      width: 140px;
      height: 3px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .loader-progress-bar-value {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #d4af37, transparent);
      animation: loading-bar 1.5s infinite linear;
      position: absolute;
      left: -100%;
    }

    .loader-status-text {
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
      color: #9ca3af;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @keyframes pulse-glow {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.05);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 0 35px rgba(212, 175, 55, 0.2);
      }
    }

    @keyframes scissor-wiggle {
      0%, 100% {
        transform: rotate(0deg);
      }
      25% {
        transform: rotate(-12deg);
      }
      75% {
        transform: rotate(12deg);
      }
    }

    @keyframes loading-bar {
      0% {
        left: -100%;
      }
      100% {
        left: 100%;
      }
    }
  </style>

  <script>
    // Función global para ocultar el loader
    window.hidePageLoader = function() {
      const loader = document.getElementById('global-page-loader');
      if (loader && !loader.classList.contains('fade-out')) {
        loader.classList.add('fade-out');
        setTimeout(() => {
          loader.style.display = 'none';
        }, 400);
      }
    };
    
    // Fallback de seguridad: Ocultar el loader después de 4.5 segundos máximo por si ocurre algún error de red
    setTimeout(() => {
      if (typeof window.hidePageLoader === 'function') {
        window.hidePageLoader();
      }
    }, 4500);
  </script>
</head>
<body>
  
  <!-- Loader Screen -->
  <div id="global-page-loader" class="global-loader-container">
    <div class="global-loader-content">
      <div class="loader-scissors-icon">
        <i data-lucide="scissors" style="width: 48px; height: 48px; stroke: var(--primary); stroke-width: 1.5;"></i>
      </div>
      <h1 class="loader-brand-title">Los Angeles Barber</h1>
      <div class="loader-progress-bar">
        <div class="loader-progress-bar-value"></div>
      </div>
      <p class="loader-status-text">Cargando...</p>
    </div>
  </div>
  <script>
    // Inicializar iconos del loader inmediatamente
    if (window.lucide) {
      window.lucide.createIcons();
    }
  </script>

  
  <!-- App Container (Centrado tipo móvil en escritorio, full-screen en celular) -->
  <div class="app-frame">
    
    <!-- Contenido dinámico de la página -->
    <main class="app-content">
      {{ content }}
    </main>

    <!-- Barra de navegación inferior -->
    {% include bottom_nav.html %}

  </div>

  <!-- Modal de Alerta / Confirmación Custom Premium -->
  <div id="custom-modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 11, 0.85); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 100000; opacity: 0; transition: opacity 0.3s ease;">
    <div id="custom-modal-card" class="card-glass" style="width: 90%; max-width: 400px; padding: 24px; text-align: center; border-color: rgba(212, 175, 55, 0.25); transform: scale(0.9); transition: transform 0.3s ease; box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
      <div id="custom-modal-icon-container" style="width: 56px; height: 56px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 16px; margin-left: auto; margin-right: auto; background: rgba(212, 175, 55, 0.1);">
        <i id="custom-modal-icon" data-lucide="info" style="stroke: var(--primary); width: 28px; height: 28px;"></i>
      </div>
      <h3 id="custom-modal-title" style="margin-bottom: 12px; font-size: 1.25rem; color: #fff;">Mensaje</h3>
      <p id="custom-modal-message" class="service-meta" style="margin-bottom: 24px; font-size: 0.95rem; line-height: 1.5; color: var(--text-secondary);"></p>
      
      <div style="display: flex; gap: 12px; justify-content: center; align-items: center;">
        <button id="custom-modal-btn-cancel" class="btn btn-danger btn-small" style="display: none; padding: 10px 16px; margin: 0; flex: 1;">Cancelar</button>
        <button id="custom-modal-btn-confirm" class="btn btn-primary btn-small" style="padding: 10px 16px; margin: 0; flex: 1;">Aceptar</button>
      </div>
    </div>
  </div>

  <script>
    // Implementación de Alertas y Confirmaciones en Modales Premium
    window.showAlert = function(message, title = "Atención", iconName = "info") {
      return new Promise((resolve) => {
        const overlay = document.getElementById("custom-modal-overlay");
        const card = document.getElementById("custom-modal-card");
        const titleEl = document.getElementById("custom-modal-title");
        const messageEl = document.getElementById("custom-modal-message");
        const iconEl = document.getElementById("custom-modal-icon");
        const btnCancel = document.getElementById("custom-modal-btn-cancel");
        const btnConfirm = document.getElementById("custom-modal-btn-confirm");
        const iconContainer = document.getElementById("custom-modal-icon-container");

        if (!overlay || !card) {
          alert(message);
          resolve();
          return;
        }

        titleEl.innerText = title;
        messageEl.innerText = message;
        btnCancel.style.display = "none";
        btnConfirm.innerText = "Aceptar";
        
        iconEl.setAttribute("data-lucide", iconName);
        if (iconName === "alert-triangle") {
          iconContainer.style.background = "rgba(239, 68, 68, 0.1)";
          iconEl.style.stroke = "var(--danger)";
        } else {
          iconContainer.style.background = "rgba(212, 175, 55, 0.1)";
          iconEl.style.stroke = "var(--primary)";
        }
        
        if (window.lucide) window.lucide.createIcons();

        overlay.style.display = "flex";
        setTimeout(() => {
          overlay.style.opacity = "1";
          card.style.transform = "scale(1)";
        }, 10);

        const handleConfirm = (e) => {
          e.preventDefault();
          btnConfirm.removeEventListener("click", handleConfirm);
          card.style.transform = "scale(0.9)";
          overlay.style.opacity = "0";
          setTimeout(() => {
            overlay.style.display = "none";
            resolve();
          }, 300);
        };
        btnConfirm.addEventListener("click", handleConfirm);
      });
    };

    window.showConfirm = function(message, title = "Confirmar", iconName = "help-circle") {
      return new Promise((resolve) => {
        const overlay = document.getElementById("custom-modal-overlay");
        const card = document.getElementById("custom-modal-card");
        const titleEl = document.getElementById("custom-modal-title");
        const messageEl = document.getElementById("custom-modal-message");
        const iconEl = document.getElementById("custom-modal-icon");
        const btnCancel = document.getElementById("custom-modal-btn-cancel");
        const btnConfirm = document.getElementById("custom-modal-btn-confirm");
        const iconContainer = document.getElementById("custom-modal-icon-container");

        if (!overlay || !card) {
          const result = confirm(message);
          resolve(result);
          return;
        }

        titleEl.innerText = title;
        messageEl.innerText = message;
        btnCancel.style.display = "block";
        btnCancel.innerText = "Cancelar";
        btnConfirm.innerText = "Confirmar";
        
        iconEl.setAttribute("data-lucide", iconName);
        if (iconName === "trash-2" || iconName === "alert-triangle") {
          iconContainer.style.background = "rgba(239, 68, 68, 0.1)";
          iconEl.style.stroke = "var(--danger)";
        } else {
          iconContainer.style.background = "rgba(212, 175, 55, 0.1)";
          iconEl.style.stroke = "var(--primary)";
        }
        
        if (window.lucide) window.lucide.createIcons();

        overlay.style.display = "flex";
        setTimeout(() => {
          overlay.style.opacity = "1";
          card.style.transform = "scale(1)";
        }, 10);

        const cleanup = () => {
          btnConfirm.removeEventListener("click", handleConfirm);
          btnCancel.removeEventListener("click", handleCancel);
        };

        const handleConfirm = (e) => {
          e.preventDefault();
          cleanup();
          card.style.transform = "scale(0.9)";
          overlay.style.opacity = "0";
          setTimeout(() => {
            overlay.style.display = "none";
            resolve(true);
          }, 300);
        };

        const handleCancel = (e) => {
          e.preventDefault();
          cleanup();
          card.style.transform = "scale(0.9)";
          overlay.style.opacity = "0";
          setTimeout(() => {
            overlay.style.display = "none";
            resolve(false);
          }, 300);
        };

        btnConfirm.addEventListener("click", handleConfirm);
        btnCancel.addEventListener("click", handleCancel);
      });
    };
  </script>

  <!-- Inicialización de iconos de Lucide -->
  <script>
    lucide.createIcons();

    // Fallback secundario de carga: Ocultar el loader 1 segundo después del load completo del navegador
    window.addEventListener('load', () => {
      setTimeout(() => {
        if (typeof window.hidePageLoader === 'function') {
          window.hidePageLoader();
        }
      }, 1000);
    });
  </script>
</body>
</html>
